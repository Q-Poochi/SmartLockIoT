<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container pb-24">
<!-- TopAppBar -->

<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200 p-2 -ml-2 rounded-full">

</button>
<h1 class="font-headline-md text-headline-md font-bold tracking-tighter text-primary">HOME SECURITY</h1>
<button class="text-primary hover:opacity-80 transition-opacity active:scale-95 duration-200 p-2 -mr-2 rounded-full">
<span class="material-symbols-outlined block">account_circle</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col items-center justify-center pt-16 px-margin-mobile relative">
<!-- Ambient Background Glow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] max-w-[500px] max-h-[500px] bg-primary-container/5 rounded-full blur-3xl pointer-events-none"></div>

<span class="material-symbols-outlined text-[64px] text-primary-container drop-shadow-[0_0_15px_rgba(0,243,255,0.8)]" style="font-variation-settings: 'FILL' 0;">
                    lock
                </span>
<span class="font-data-display text-data-display text-primary-container tracking-[0.2em] ml-1 drop-shadow-[0_0_10px_rgba(0,243,255,0.5)]">
                    UNLOCK
                </span>
<!-- Inner technical ring -->
<div class="absolute inset-4 rounded-full border border-dashed border-primary-container/20 animate-[spin_60s_linear_infinite]"></div>
</button>
<!-- Status Indicator -->
<div class="flex items-center gap-3 bg-surface-container/40 backdrop-blur-md px-6 py-3 rounded-full border border-outline-variant/30 mt-8">
<div class="w-2 h-2 rounded-full bg-secondary-fixed shadow-[0_0_10px_rgba(121,255,91,0.8)] relative">
<div class="absolute inset-0 rounded-full bg-secondary-fixed animate-ping opacity-50"></div>
</div>
<span class="font-status-mono text-status-mono text-on-surface-variant uppercase tracking-widest">
                    Status: <span id="statusText" class="text-secondary-fixed">LOCKED</span>
</span>

<span class="font-status-mono text-[10px] uppercase tracking-wider">Settings</span>

<script>
document.getElementById('btnUnlock').addEventListener('click', async function() {
    const lockIcon = this.querySelector('.material-symbols-outlined');
    const btnText = this.querySelector('.font-data-display');
    const statusText = document.getElementById('statusText');
    btnText.innerText = 'OPENING...';
    try {
        const res = await fetch('/api/SmartLock/command', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ deviceId: 'esp32/led', unlock: true })
        });
        if (res.ok) {
            lockIcon.innerText = 'lock_open';
            btnText.innerText = 'UNLOCKED';
            statusText.innerText = 'UNLOCKED';
            statusText.style.color = '#00f3ff';
            this.style.borderColor = 'rgba(0, 243, 255, 0.8)';
            this.style.boxShadow = '0 0 60px rgba(0, 243, 255, 0.4)';
            setTimeout(() => {
                lockIcon.innerText = 'lock';
                btnText.innerText = 'UNLOCK';
                statusText.innerText = 'LOCKED';
                statusText.style.color = '';
                this.style.borderColor = '';
                this.style.boxShadow = '';
            }, 3000);
        }
    } catch (e) { alert('API Connection Failed!'); }
});

async function loadMiniLogs() {
    try {
        const res = await fetch('/api/SmartLock/access-logs');
        const logs = await res.json();
        const container = document.getElementById('miniLogList');
        if (logs.length === 0) {
            container.innerHTML = '<div class="text-center py-4 text-on-surface-variant font-status-mono text-[10px]">No recent access.</div>';
            return;
        }
        container.innerHTML = '';
        logs.slice(0, 3).forEach(log => {
            const d = new Date(log.timestamp);
            const time = d.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
            const methodIcon = log.accessType === 'FaceID' ? 'face' : 'vpn_key';
            const iconColor = log.isSuccess ? 'text-primary-container' : 'text-error';
            const iconBg = log.isSuccess ? 'bg-primary-container/10' : 'bg-error-container/20';
            const titleColor = log.isSuccess ? 'text-on-surface' : 'text-error';
            container.innerHTML += `
                <div class="flex items-center justify-between p-3 bg-white/[0.02] hover:bg-white/[0.05] transition-colors">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full ${iconBg} flex items-center justify-center">
                            <span class="material-symbols-outlined ${iconColor} text-lg">${methodIcon}</span>
                        </div>
                        <div>
                            <p class="font-body-sm ${titleColor} font-semibold">${log.message || 'Access Event'}</p>
                            <p class="font-status-mono text-[10px] text-on-surface-variant/60">${log.accessType}</p>
                        </div>
                    </div>
                    <span class="font-status-mono text-[10px] text-outline">${time}</span>
                </div>
            `;
        });
    } catch(e) {}
}
loadMiniLogs();
setInterval(loadMiniLogs, 5000);
</script>
</body></html>
