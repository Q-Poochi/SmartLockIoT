<script>
async function loadLogs() {
    try {
        const res = await fetch('/api/SmartLock/access-logs');
        const logs = await res.json();
        const container = document.getElementById('logList');
        if (logs.length === 0) {
            container.innerHTML = '<div class="text-center py-xl text-on-surface-variant font-status-mono">No access logs yet.</div>';
            return;
        }
        container.innerHTML = '';
        logs.forEach(log => {
            const d = new Date(log.timestamp);
            const time = d.toLocaleTimeString('vi-VN', {hour:'2-digit', minute:'2-digit'});
            const icon = log.isSuccess ? 'lock_open' : 'warning';
            const iconBg = log.isSuccess ? 'bg-secondary-container/10 border-secondary-container/30' : 'bg-error-container/20 border-error/50';
            const iconColor = log.isSuccess ? 'text-secondary-container' : 'text-error';
            const titleColor = log.isSuccess ? 'text-on-surface' : 'text-error';
            const glow = log.isSuccess ? 'glow-green' : 'shadow-[0_0_15px_rgba(255,180,171,0.2)]';
            const cardExtra = log.isSuccess ? '' : 'border-error/30 bg-error-container/5';
            container.innerHTML += `
                <div class="glass-card rounded-lg p-md flex items-start gap-md group ${cardExtra}">
                    <div class="flex flex-col items-center gap-xs w-16 shrink-0">
                        <span class="font-data-display text-data-display text-on-surface">${time}</span>
                        <span class="font-status-mono text-[10px] text-on-surface-variant">TODAY</span>
                    </div>
                    <div class="w-10 h-10 rounded-full ${iconBg} flex items-center justify-center shrink-0 ${glow}">
                        <span class="material-symbols-outlined ${iconColor}">${icon}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-body-lg text-body-lg ${titleColor} truncate">${log.message || 'Access Event'}</h3>
                        <p class="font-body-sm text-body-sm text-on-surface-variant truncate">Method: ${log.accessType} | Code: ${log.accessCode}</p>
                    </div>
                </div>`;
        });
    } catch (e) { console.error('Failed to load logs:', e); }
}
loadLogs();
setInterval(loadLogs, 10000);
</script>
